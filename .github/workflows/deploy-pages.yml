name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - results/**
      - isovist-app/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: isovist-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: isovist-app

      - name: Build app
        run: npm run build
        working-directory: isovist-app

      - name: Assemble site
        run: |
          mkdir -p _site
          if [ -d results ]; then cp -r results/. _site/; fi
          cp -r isovist-app/dist _site/isovist-app

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
